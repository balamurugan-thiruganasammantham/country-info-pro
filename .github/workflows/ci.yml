name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.js || exit 1
          test -f dist/index.mjs || exit 1
          test -f dist/index.d.ts || exit 1
          echo "Build output verified"

      - name: Check bundle size
        run: |
          CJS_SIZE=$(wc -c < dist/index.js)
          ESM_SIZE=$(wc -c < dist/index.mjs)
          echo "CJS: ${CJS_SIZE} bytes ($(( CJS_SIZE / 1024 )) KB)"
          echo "ESM: ${ESM_SIZE} bytes ($(( ESM_SIZE / 1024 )) KB)"
          if [ "$CJS_SIZE" -gt 512000 ]; then
            echo "::error::CJS bundle exceeds 500KB limit"
            exit 1
          fi
